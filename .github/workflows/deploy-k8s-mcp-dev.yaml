name: Deploy K8s Wagtail MCP Dev

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: build
        run: |
          chmod +x build_and_push_docker.sh
          ./build_and_push_docker.sh

      - name: Set up kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_NDT }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply configmap
        run: |
          kubectl apply -f k8s/dev/configmap.yaml

      - name: Apply deployment
        run: |
          IMAGE="${{ steps.build.outputs.image }}"
          sed "s|timenovadata/wagtail-mcp:latest|${IMAGE}|g" k8s/dev/deployment.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/wagtail-mcp-deployment \
            -n logbitb2b-wagtail-dev --timeout=300s
