apiVersion: apps/v1
kind: Deployment
metadata:
  name: wagtail-mcp-deployment
  namespace: logbitb2b-wagtail-dev
  labels:
    app: wagtail-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wagtail-mcp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: wagtail-mcp
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: wagtail-mcp
          image: timenovadata/wagtail-mcp:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: wagtail-mcp-configmap
            - secretRef:
                name: wagtail-mcp-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
